<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Health Monitoring System</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .container {
        width: 90%;
        max-width: 800px;
        background: #1e293b;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }
      h1 {
        text-align: center;
        margin-bottom: 30px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
      }
      .card {
        background: #334155;
        border-radius: 16px;
        padding: 20px;
        text-align: center;
      }
      .label {
        font-size: 18px;
        color: #cbd5e1;
        margin-bottom: 10px;
      }
      .value {
        font-size: 42px;
        font-weight: bold;
      }
      .unit {
        font-size: 20px;
        color: #94a3b8;
      }
      .footer {
        margin-top: 25px;
        text-align: center;
        color: #94a3b8;
      }
      .status {
        margin-top: 10px;
        font-size: 14px;
        color: #22c55e;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Health Monitoring Dashboard</h1>

      <div class="grid">
        <div class="card">
          <div class="label">Nhiệt độ cơ thể</div>
          <div class="value">
            <span id="temp">--</span> <span class="unit">°C</span>
          </div>
        </div>

        <div class="card">
          <div class="label">Nhịp tim</div>
          <div class="value">
            <span id="hr">--</span> <span class="unit">BPM</span>
          </div>
        </div>
      </div>

      <div class="footer">
        <div>Cập nhật gần nhất: <span id="updated">--</span></div>
        <div class="status" id="status">Đang chờ dữ liệu...</div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        onValue,
      } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCqKUkAogvmRJZuzjvYdwhQ3FfNcR031Cs",
        authDomain: "health-monitoring-system-ic.firebaseapp.com",
        databaseURL:
          "https://health-monitoring-system-ic-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "health-monitoring-system-ic",
        storageBucket: "health-monitoring-system-ic.firebasestorage.app",
        messagingSenderId: "892098408908",
        appId: "1:892098408908:web:7022f7f324985227d26d69",
        measurementId: "G-DWGD6367RD",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      const tempEl = document.getElementById("temp");
      const hrEl = document.getElementById("hr");
      const updatedEl = document.getElementById("updated");
      const statusEl = document.getElementById("status");

      onValue(
        ref(db, "health/latest"),
        (snapshot) => {
          const data = snapshot.val();

          if (!data) {
            statusEl.textContent = "Chưa có dữ liệu từ Firebase";
            return;
          }

          tempEl.textContent = data.bodyTemp ?? "--";
          hrEl.textContent = data.heartRate ?? "--";
          updatedEl.textContent = data.updatedAt
            ? new Date(data.updatedAt).toLocaleString("vi-VN")
            : "--";

          statusEl.textContent = "Đã kết nối realtime với Firebase";
        },
        (error) => {
          console.error(error);
          statusEl.textContent = "Lỗi kết nối Firebase";
        },
      );
    </script>
  </body>
</html>
